<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Siri Shortcut</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .info {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 12px;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        /* iPad/Tablet optimizations */
        @media (min-width: 768px) {
            .container {
                padding: 50px 40px;
            }

            .btn {
                padding: 18px 28px;
                font-size: 18px;
            }

            h1 {
                font-size: 32px;
            }
        }

        /* Landscape mode optimization */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                padding: 10px;
            }

            .container {
                padding: 30px 40px;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 8px;
            }

            .subtitle {
                margin-bottom: 20px;
                font-size: 13px;
            }

            .icon {
                font-size: 40px;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎙️</div>
        <h1>Mini Siri</h1>
        <p class="subtitle">Quick access to your custom Apple Shortcut</p>
        
        <div class="button-group">
            <a href="https://www.icloud.com/shortcuts/1453178aeff141aeaa781635f2ee9fc5" class="btn btn-primary">
                Open Shortcut
            </a>
            <button class="btn btn-secondary" onclick="copyLink()">
                Copy Link
            </button>
        </div>

        <div class="info">
            ℹ️ Works best on Apple devices (iPhone, iPad, Mac)<br>
            The Shortcuts app will open when you tap the button above
        </div>
    </div>

    <script>
        function copyLink() {
            const link = "https://www.icloud.com/shortcuts/1453178aeff141aeaa781635f2ee9fc5";
            navigator.clipboard.writeText(link).then(() => {
                alert("Link copied to clipboard!");
            }).catch(() => {
                alert("Failed to copy link");
            });
        }
    </script>
</body>
</html>
